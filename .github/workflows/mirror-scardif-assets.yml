name: Mirror Scardif assets

on:
  push:
    paths:
      - '.github/workflows/mirror-scardif-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror-assets:
    if: ${{ !contains(github.event.head_commit.message, 'Mirror Scardif external assets') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download mirrored assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Help Downloads/V8.0 Downloads

          curl -L --fail --retry 3 -o "Version.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Version.md"
          curl -L --fail --retry 3 -o "Help/Supported Windows Versions.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Help/Supported%20Windows%20Versions.md"
          curl -L --fail --retry 3 -o "Help/Oneclick Tools Help.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Help/Oneclick%20Tools%20Help.md"
          curl -L --fail --retry 3 -o "Help/Windows Defender Options.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Help/Windows%20Defender%20Options.md"
          curl -L --fail --retry 3 -o "Help/Search Removal Options.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Help/Search%20Removal%20Options.md"
          curl -L --fail --retry 3 -o "Help/GPU Tweaks Options.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Help/GPU%20Tweaks%20Options.md"
          curl -L --fail --retry 3 -o "Help/Priority Separation Options.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Help/Priority%20Separation%20Options.md"
          curl -L --fail --retry 3 -o "Help/Timer Resolution Options.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Help/Timer%20Resolution%20Options.md"
          curl -L --fail --retry 3 -o "Help/Power Plan Options.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Help/Power%20Plan%20Options.md"
          curl -L --fail --retry 3 -o "Help/Oneclick Fixes.md" "https://raw.githubusercontent.com/QuakedK/Oneclick/main/Help/Oneclick%20Fixes.md"
          curl -L --fail --retry 3 -o "Downloads/V8.0/OneclickTools.zip" "https://github.com/QuakedK/Oneclick/raw/refs/heads/main/Downloads/V8.0/OneclickTools.zip"
          curl -L --fail --retry 3 -o "Downloads/V8.0/dControl.exe" "https://github.com/QuakedK/Oneclick/raw/refs/heads/main/Downloads/V8.0/dControl.exe"
          curl -L --fail --retry 3 -o "Downloads/V8.0/OpenShellTheme.xml" "https://github.com/QuakedK/Oneclick/raw/refs/heads/main/Downloads/V8.0/OpenShellTheme.xml"
          curl -L --fail --retry 3 -o "Downloads/V8.0/nvcplui.exe" "https://github.com/QuakedK/Oneclick/raw/refs/heads/main/Downloads/V8.0/nvcplui.exe"
          curl -L --fail --retry 3 -o "Downloads/OpenShellSetup_4_4_196.exe" "https://github.com/Open-Shell/Open-Shell-Menu/releases/download/v4.4.196/OpenShellSetup_4_4_196.exe"
          curl -L --fail --retry 3 -o "Downloads/vc_redist.x64.exe" "https://aka.ms/vs/17/release/vc_redist.x64.exe"

          cat > mirror-report.txt <<'REPORT'
          Files mirrored for Scardif_Tweak_v1.0.bat.
          Generated by GitHub Actions.
          REPORT

      - name: Commit mirrored assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Version.md Help Downloads mirror-report.txt
          if git diff --cached --quiet; then
            echo "No mirrored asset changes to commit."
            exit 0
          fi
          git commit -m "Mirror Scardif external assets"
          git push
